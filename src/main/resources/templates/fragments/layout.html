<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" 
    xmlns:sec="http://thymeleaf.org/extras/spring-security"
    th:fragment="main-layout(content, title, pageStyles, scripts)">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light"> 

    <script th:src="@{/js/theme-switch.js}" defer></script>

    <link rel="stylesheet" th:href="@{/css/style.css}" blocking="render">

    <th:block th:replace="${pageStyles}"></th:block>

    <title th:replace="${title}">PI-FOCUS</title>
    <script>let FF_FOUC_FIX;</script> 
</head>
<body>
    <header>
        <nav th:replace="~{fragments/basic-components :: header-nav}"></nav>
    </header>
    <main>
        <div class="main-wrapper">
            <div th:replace="${content}">Content space</div>
        </div>
    </main>
    <footer>
        <div th:replace="~{fragments/basic-components :: footer-info}"></div>
    </footer>
    <script th:src="@{/js/user-menu.js}" defer></script>
    <th:block th:replace="${scripts}"></th:block>
</body>
</html>
